<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>26-2</title>
  <title>🗽Schedule time table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      padding: 30px;
    }
    h1 {
      margin-bottom: 16px;
    }
    #clock {
      font-size: 2rem;
      color: #333;
      margin-bottom: 24px;
    }
    #current-professor {
      font-size: 1.2rem;
      margin-top: 20px;
      font-weight: bold;
      white-space: pre-line; /* 여러 줄 출력 허용 */
    }
  </style>
</head>
<body>
  <h1>26-2</h1>
  <h1>🗽Schedule time table</h1>

  <!-- 현재 시간 -->
  <h2>현재 시간</h2>
  <div id="clock"></div>

  <!-- 현재 수업 중인 교수님 -->
  <h2>🚈 현재 수업 중인 교수님</h2>
  <div id="current-professor">확인 중...</div>

  <script>
    // ===== 현재 시간 표시 =====
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");
      const seconds = String(now.getSeconds()).padStart(2, "0");
      document.getElementById("clock").textContent =
        `${hours}:${minutes}:${seconds}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ===== 교수님 시간표 (강의명 포함) =====
    const schedule = [
      {
        name: "엄**",
        schedule: [
          { day: "월", start: "17:00", end: "17:50", subject: "7229 비모수통계학" },
          { day: "수", start: "16:00", end: "16:50", subject: "7229 비모수통계학" },
          { day: "월", start: "15:00", end: "16:50", subject: "7226 수리통계학2" },
          { day: "수", start: "15:00", end: "15:50", subject: "7226 수리통계학2" }
        ]
      },
      {
        name: "박**",
        schedule: [
          { day: "월", start: "14:00", end: "14:50", subject: "7226 회귀분석" },
          { day: "수", start: "13:00", end: "14:50", subject: "7226 회귀분석 - 비대면" }
        ]
      },
     // 연구년 최** 교수 26년 (1 year)
      {
        name: "오**",
        schedule: [
          { day: "월", start: "16:00", end: "16:50", subject: "7229 탐색적자료분석" },
          { day: "수", start: "13:00", end: "14:50", subject: "7229 탐색적자료분석" },
          { day: "화", start: "13:30", end: "14:45", subject: "7229 통계적인과추론" },
          { day: "목", start: "13:30", end: "14:45", subject: "7229 통계적인과추론" },
          { day: "월", start: "13:00", end: "15:50", subject: "7231 다변량통계 - 대학원" } // 대학원
        ]
      },
      {
        name: "하**",
        schedule: [
          { day: "화", start: "10:30", end: "11:45", subject: "7229 파이썬 프로그래밍" },
          { day: "목", start: "10:30", end: "11:45", subject: "7229 파이썬 프로그래밍" },
          { day: "화", start: "13:00", end: "14:50", subject: "7231 빅데이터생존분석" },
          { day: "목", start: "14:00", end: "14:50", subject: "7231 빅데이터생존분석" },
          { day: "수", start: "10:00", end: "12:50", subject: "7231 의존성모델링개론 - 대학원" } // 대학원
        ]
      },
      {
        name: "김**",
        schedule: [
          { day: "화", start: "13:30", end: "14:45", subject: "7226 통계데이터사이언스수학" },
          { day: "목", start: "13:30", end: "14:45", subject: "7226 통계데이터사이언스수학" },
          { day: "월", start: "13:00", end: "14:50", subject: "7229 통계학 개론1" }, //타학과
          { day: "수", start: "15:00", end: "15:50", subject: "7229 통계학 개론1" }, //
          { day: "화", start: "15:00", end: "16:15", subject: "7229 통계학 머신러닝" }, 
          { day: "목", start: "15:00", end: "16:15", subject: "7229 통계학 머신러닝" }
        ]
      },

      {
        name: "외부강사 김**",
        schedule: [
          { day: "화", start: "15:00", end: "16:15", subject: "7226 확률론" },
          { day: "목", start: "15:00", end: "16:15", subject: "7226 확률" }
        ]
      },

      {
        name: "외부강사 고**",
        schedule: [
          { day: "수", start: "14:00", end: "16:50", subject: "7231 헬스케어데이터분" }
        ]
      },

      {
        name: "외부강사 이**",
        schedule: [
          { day: "화", start: "16:30", end: "17:45", subject: "7229 데이터시각화" },
          { day: "", start: "16:30", end: "17:45", subject: "7229 데이터시각화" }
        ]
      }
      // 👉 다른 교수님도 같은 형식으로 추가 가능
    ];

    // 요일 변환
    const dayMap = ["일","월","화","수","목","금","토"];

    function checkCurrentProfessor() {
      const now = new Date();
      const currentDay = dayMap[now.getDay()];
      const currentTime = now.getHours() * 60 + now.getMinutes();

      const teachingNow = [];

      schedule.forEach(prof => {
        prof.schedule.forEach(cls => {
          if (cls.day === currentDay) {
            const [sh, sm] = cls.start.split(":").map(Number);
            const [eh, em] = cls.end.split(":").map(Number);
            const startMins = sh * 60 + sm;
            const endMins = eh * 60 + em;

            if (currentTime >= startMins && currentTime < endMins) {
              teachingNow.push(
                `${prof.name} - ${cls.subject} (${cls.start} ~ ${cls.end})`
              );
            }
          }
        });
      });

      const output = document.getElementById("current-professor");
      if (teachingNow.length > 0) {
        output.textContent = teachingNow.join("\n"); // 여러 줄 출력
      } else {
        output.textContent = "현재 수업 중인 교수님이 없습니다.";
      }
    }

    setInterval(checkCurrentProfessor, 10000); // 10초마다 확인
    checkCurrentProfessor();
  </script>
</body>

</html>
